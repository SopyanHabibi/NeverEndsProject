<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neira</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-okaidia.min.css">
    <!-- Google Fonts: Inter & Plus Jakarta Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css">

</head>
<body>

    <div class="app-container">
        <!-- SIDEBAR -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <button class="new-chat-btn" id="newChatBtn"><i class="fa-regular fa-pen-to-square"></i> New Chat</button>
            </div>
            <!-- Bagian Projects -->
            <div class="sidebar-category-title">Projects</div>
            <div id="projectList" class="history-list-container">
                <div class="no-data-placeholder">No projects</div>
            </div>

            <!-- Bagian Chats / General -->
            <div class="sidebar-category-title">Chats</div>
            <div id="generalList" class="history-list-container">
                <!-- Tempat chat umum muncul -->
            </div>
        </aside>

        <!-- MAIN CONTENT AREA -->
        <main class="main-content">
            <header class="header">
                <button class="menu-btn" id="menuBtn">☰</button>
                <button class="menu-btn" id="workflowBtn" title="Workflow"><i class="fa-solid fa-diagram-project"></i></button>
                <div class="status-indicator">
                    <span class="status-dot"></span> Online
                </div>
            </header>

            <div class="chat-container" id="chatContainer">
                <!-- WELCOME PAGE (True Center & Animated) -->
                <div class="welcome-screen" id="welcomeScreen">
                    <h1 class="animate-fade-up">Hello, Ian</h1>
                    <p class="animate-fade-up-delay">How can I assist your tech journey today?</p>
                </div>
            </div>

            <footer class="input-area">
                <div class="input-wrapper">
                    <textarea id="userInput" placeholder="Ask Neira..." rows="1" autofocus></textarea>
                    
                    <input type="file" id="fileInput" accept=".pdf,.docx,.pptx" style="display:none;">
                    <button id="uploadBtn" class="action-btn" title="Upload Document"><i class="fa-solid fa-paperclip fa-lg"></i></button>
                    
                    <input type="file" id="imageInput" accept="image/jpeg,image/png,image/webp" style="display:none;">
                    <button id="imageBtn" class="action-btn" title="Upload Image"><i class="fa-regular fa-image fa-lg"></i></button>

                    <button id="sendBtn" class="action-btn" title="Send Message"><i class="fa-solid fa-paper-plane fa-lg"></i></button>
                </div>
            </footer>
        </main>
    </div>

    <div id="codeQuestionModal" class="modal-overlay">
    <div class="modal-box">
        <div class="modal-code-side">
            <div class="code-filename" id="codeQuestionFileLabel">script.js</div>
            <pre class="code-snippet-box"><code id="codeQuestionSnippet"></code></pre>
        </div>
        <div class="modal-form-side">
            <p id="codeQuestionMessage">What would you like to know about this code?</p>
            <input type="text" id="codeQuestionInput" autocomplete="off" placeholder="e.g. Why is this throwing an error?">
            <div class="modal-buttons">
                <button id="codeQuestionCancel" class="btn-cancel">Cancel</button>
                <button id="codeQuestionSubmit" class="btn-submit">Ask Neira</button>
            </div>
        </div>
    </div>
</div>

<div id="workflowModal" class="modal-overlay">
    <div class="modal-box">
        <div class="modal-form-side" style="width:100%;">
            <p>Workflows</p>

            <div id="workflowList" class="workflow-list">
                <!-- diisi JS: daftar workflow yang udah ada -->
            </div>

            <hr style="border-color:#2a2e3f; margin:16px 0;">

            <p>Buat Workflow Baru</p>
            <input type="text" id="workflowNameInput" autocomplete="off" placeholder="Nama workflow...">
            <input type="time" id="workflowTimeInput" style="margin-top:8px;">
            <select id="workflowActionSelect" style="margin-top:8px; width:100%;">
                <option value="">-- Pilih Action --</option>
                <option value="tasks">Rekap Tasks</option>
                <option value="auto_remember">Auto Remember</option>
            </select>

            <div class="modal-buttons">
                <button id="workflowCancel" class="btn-cancel">Tutup</button>
                <button id="workflowSubmit" class="btn-submit">Simpan Workflow</button>
            </div>
        </div>
    </div>
</div>

    <script type="module" src="js/script.js"></script>
    <script src="https://kit.fontawesome.com/e7c9547f6e.js" crossorigin="anonymous"></script>
    <!-- Masukkan di paling bawah, tepat SEBELUM tag penutup </body> -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <!-- Library pendukung bahasa JavaScript & Python (tambahkan yang lain jika perlu) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.js"></script>
</body>
</html>
