<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neira</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        <!-- SIDEBAR -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <button class="new-chat-btn" id="newChatBtn">➕ New Chat</button>
            </div>
            <!-- Bagian Projects -->
            <div class="sidebar-category-title">Projects</div>
            <div id="projectList" class="history-list-container">
                <div class="no-data-placeholder">No projects</div>
            </div>

            <!-- Bagian Chats / General -->
            <div class="sidebar-category-title">Chats</div>
            <div id="generalList" class="history-list-container">
                <!-- Tempat chat umum muncul -->
            </div>
        </aside>

        <!-- MAIN CONTENT AREA -->
        <main class="main-content">
            <header class="header">
                <button class="menu-btn" id="menuBtn">☰</button>
                <div class="status-indicator">
                    <span class="status-dot"></span> Online
                </div>
            </header>

            <div class="chat-container" id="chatContainer">
                <!-- WELCOME PAGE (True Center & Animated) -->
                <div class="welcome-screen" id="welcomeScreen">
                    <h1 class="animate-fade-up">Hello, Ian</h1>
                    <p class="animate-fade-up-delay">How can I assist your tech journey today?</p>
                </div>
            </div>

            <footer class="input-area">
                <div class="input-wrapper">
                    <textarea id="userInput" placeholder="Ask Neira..." rows="1" autofocus></textarea>
                    
                    <input type="file" id="fileInput" accept=".pdf,.docx,.pptx" style="display:none;">
                    <button id="uploadBtn" class="action-btn" title="Upload Document"><i class="fa-solid fa-paperclip fa-lg"></i></button>
                    
                    <input type="file" id="imageInput" accept="image/jpeg,image/png,image/webp" style="display:none;">
                    <button id="imageBtn" class="action-btn" title="Upload Image"><i class="fa-regular fa-image fa-lg"></i></button>

                    <button id="sendBtn" class="action-btn" title="Send Message"><i class="fa-solid fa-paper-plane fa-lg"></i></button>
                </div>
            </footer>
        </main>
    </div>

    <div id="codeQuestionModal" class="modal-overlay">
    <div class="modal-box">
        <div class="modal-form-side" style="width:100%;">
            <p id="codeQuestionMessage">What would you like to know about this code?</p>
            <p style="font-size:0.8rem; opacity:0.6; margin-top:-8px;" id="codeQuestionFileLabel"></p>
            <input type="text" id="codeQuestionInput" autocomplete="off" placeholder="e.g. Why is this throwing an error?">
            <div class="modal-buttons">
                <button id="codeQuestionCancel" class="btn-cancel">Cancel</button>
                <button id="codeQuestionSubmit" class="btn-submit">Ask Neira</button>
            </div>
        </div>
    </div>
</div>

    <script type="module" src="script.js"></script>
    <script src="https://kit.fontawesome.com/e7c9547f6e.js" crossorigin="anonymous"></script>

    <!-- <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script> -->
</body>
</html>
